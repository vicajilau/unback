# Configuration file for Dependabot version updates.
# Documentation: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # GitHub Actions workflows dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # Dart/Pub dependencies - Workspace Root (resolves the entire workspace automatically)
  - package-ecosystem: "pub"
    directory: "/"
    schedule:
      interval: "weekly"