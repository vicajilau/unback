name: Publish iOS Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  publish_ios_release:
    name: Generate iOS Release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'
      
      - name: Install Apple Certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_DIST_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_DIST_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: "dist_password"
        run: |
          # create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # import certificate and provisioning profile from secrets
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          # create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # import certificate to keychain
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Install Provisioning Profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          # create variables
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision

          # import provisioning profile from secrets
          echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          # apply provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Extract app version and build number
        run: |
          VERSION_LINE=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          APP_VERSION=$(echo "$VERSION_LINE" | sed 's/+.*//')
          BUILD_NUMBER=$(echo "$VERSION_LINE" | sed 's/.*+//')
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV
          
      - name: Install dependencies
        run: flutter pub get

      - name: Build IPA
        run: flutter build ipa --release --export-options-plist=ios/Runner/ExportOptions.plist

      - name: Upload ipa to Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ios-release-artifacts
          if-no-files-found: error
          path: build/ios/ipa/*.ipa

      - name: Generate App Store release notes
        run: dart distribution/apple/generate_apple_release_notes.dart --version=${{ github.ref_name }}

      - name: Install Fastlane
        run: gem install fastlane --no-document

      - name: Submit iOS release to App Store Connect
        env:
          API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APPLE_API_KEY_ISSUER }}
          API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
          APPLE_BUNDLE_ID: es.victorcarreras.backgroundRemover
        run: |
          AUTOMATIC_RELEASE=true
          mkdir -p distribution/apple/fastlane
          jq -n \
            --arg key_id "$API_KEY_ID" \
            --arg issuer_id "$API_ISSUER_ID" \
            --arg key "$API_KEY_CONTENT" \
            '{key_id: $key_id, issuer_id: $issuer_id, key: $key, in_house: false}' \
            > distribution/apple/fastlane/app_store_connect_api_key.json

          touch Deliverfile
          fastlane deliver \
            --platform ios \
            --api_key_path distribution/apple/fastlane/app_store_connect_api_key.json \
            --app_identifier "$APPLE_BUNDLE_ID" \
            --app_version "$APP_VERSION" \
            --metadata_path distribution/apple/fastlane/metadata \
            --ipa build/ios/ipa/*.ipa \
            --skip_screenshots true \
            --submit_for_review true \
            --automatic_release "$AUTOMATIC_RELEASE" \
            --precheck_include_in_app_purchases false \
            --force
